{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}{% endblock title %}</title>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family: 'Poppins', sans-serif;
        }

        body{
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
        }

        /* Navbar */
        .navbar{
            display:flex;
            justify-content:space-between;
            align-items:center;
            padding:20px 60px;
            background: rgba(0,0,0,0.2);
            backdrop-filter: blur(10px);
        }

        .logo{
            font-size:28px;
            font-weight:700;
            letter-spacing:1px;
        }

        .logo a{
            color:white;
            text-decoration:none;

        }

        .nav-links{
            list-style:none;
            display:flex;
            gap:30px;
        }

        .nav-links li a{
            text-decoration:none;
            color:white;
            font-weight:500;
            transition:0.3s;
        }

        .nav-links li a:hover{
            color:#ffd369;
        }

        /* Hero Section */
        .hero{
            height:90vh;
            display:flex;
            justify-content:center;
            align-items:center;
            text-align:center;
            flex-direction:column;
            padding:20px;
        }

        .hero h1{
            font-size:50px;
            margin-bottom:20px;
        }

        .hero p{
            font-size:18px;
            max-width:600px;
            margin-bottom:30px;
        }

        .btn{
            padding:12px 25px;
            background:#ffd369;
            color:black;
            border:none;
            border-radius:25px;
            font-weight:600;
            cursor:pointer;
            transition:0.3s;
        }

        .btn:hover{
            background:white;
        }

        /* Responsive */
        @media(max-width:768px){
            .navbar{
                flex-direction:column;
                gap:15px;
            }

            .hero h1{
                font-size:35px;
            }
        }
    </style>
</head>
<body>

    <!-- Navbar -->
    <nav class="navbar">
        <div class="logo"><a href="{% url "todolist" %}"><img src="{% static "/images/todo.png" %}" alt="todo logo/Todoist_logo.png"  height="50"></a></div>

        <ul class="nav-links">
            <li><a href="{% url "todolist" %}">Home</a></li>
            <li><a href="{% url "about" %}">About Us</a></li>
            <li><a href="{% url "blog" %}">Blog</a></li>
            <li><a href="{% url "contact" %}">Contact Us</a></li>
        </ul>
    </nav>









<!-- Hero Section -->
    <section class="hero">
        <h1>{% block msg %}{% endblock msg %}</h1>
        <p>
            Organize your tasks, boost productivity, and stay on track every day.
            Your personal task manager made simple and powerful.
        </p>
        <button class="btn">Get Started</button>
    </section> 

</body>
</html>
